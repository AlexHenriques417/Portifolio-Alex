<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Alex Henriques</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .admin-container { max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .admin-title { font-family: 'Poppins', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); }
    .logout-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    .admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 30px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .edit-btn { background: linear-gradient(135deg, var(--accent2), var(--accent)); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); }
    .form-group input, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: var(--text); }
    .tech-tag { display: inline-block; background: var(--accent2); color: white; padding: 5px 10px; border-radius: 4px; margin: 5px; font-size: 0.8rem; }
    .login-container { max-width: 400px; margin: 200px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; }
    .avatar-preview { width: 150px; height: 150px; border-radius: 8px; object-fit: cover; border: 2px solid var(--border); }
    .cert-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    .success-message { background: rgba(0,200,83,0.1); border: 1px solid #00c853; color: #00c853; padding: 10px; border-radius: 6px; margin-bottom: 20px; display: none; }
    .photo-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .photo-buttons button { flex: 1; }
  </style>
</head>
<body>

<div id="login-screen" class="login-container">
  <h2><i class="fas fa-lock"></i> Área Administrativa</h2>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="login-email" value="alexhenriques417@gmail.com">
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="login-password">
  </div>
  <button class="edit-btn" onclick="login()" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Entrar</button>
</div>

<div id="admin-panel" class="admin-container" style="display: none;">
  <div class="admin-header">
    <h1 class="admin-title"><i class="fas fa-cog"></i> Painel Administrativo</h1>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
  </div>
  
  <div id="success-message" class="success-message"></div>
  
  <!-- Perfil -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-user"></i> Perfil</h2>
      <button class="edit-btn" onclick="saveProfile()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="edit-name" value="Alex Henriques">
    </div>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="edit-title" value="Desenvolvedor">
    </div>
    <div class="form-group">
      <label>Sobre Mim (Biografia)</label>
      <textarea id="edit-bio" rows="5" placeholder="Conte um pouco sobre você..."></textarea>
    </div>
    
    <!-- UPLOAD DE FOTO -->
    <div class="form-group">
      <label>Foto de Perfil</label>
      <div style="display: flex; gap: 20px; align-items: center;">
        <img id="profile-preview" class="avatar-preview" style="display: none;">
        <div style="flex: 1;">
          <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
          <div class="photo-buttons">
            <button onclick="document.getElementById('avatar-upload').click()" class="edit-btn"><i class="fas fa-folder-open"></i> Escolher</button>
            <button onclick="uploadAvatar()" class="edit-btn"><i class="fas fa-upload"></i> Salvar Foto</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Contatos -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-address-book"></i> Contatos</h2>
      <button class="edit-btn" onclick="saveContacts()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="edit-email"></div>
    <div class="form-group"><label><i class="fas fa-phone"></i> Telefone</label><input type="text" id="edit-phone"></div>
    <div class="form-group"><label><i class="fab fa-github"></i> GitHub</label><input type="text" id="edit-github"></div>
    <div class="form-group"><label><i class="fab fa-linkedin"></i> LinkedIn</label><input type="text" id="edit-linkedin"></div>
  </div>
  
  <!-- Habilidades -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-chart-bar"></i> Habilidades</h2>
      <button class="edit-btn" onclick="saveSkills()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <h3><i class="fas fa-heart"></i> Soft Skills</h3>
    <div id="soft-skills-list" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;"></div>
    <button class="edit-btn" onclick="addSoftSkill()"><i class="fas fa-plus"></i> Adicionar Soft Skill</button>
    
    <h3 style="margin-top: 30px;"><i class="fas fa-cogs"></i> Hard Skills</h3>
    <div id="hard-skills-list-admin"></div>
    <button class="edit-btn" onclick="addHardSkill()"><i class="fas fa-plus"></i> Adicionar Hard Skill</button>
  </div>
  
  <!-- Estatísticas -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-chart-pie"></i> Estatísticas</h2>
      <button class="edit-btn" onclick="saveStats()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    <div id="stats-list"></div>
    <button class="edit-btn" onclick="addStat()"><i class="fas fa-plus"></i> Adicionar Estatística</button>
  </div>
  
  <!-- Certificados -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-certificate"></i> Certificados</h2>
      <button class="edit-btn" onclick="saveCertificates()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    
    <div style="background: var(--bg2); padding: 20px; border-radius: 8px; margin-bottom: 30px;">
      <h3><i class="fas fa-plus-circle"></i> Adicionar Novo Certificado</h3>
      <div class="form-group">
        <label>Nome do Certificado</label>
        <input type="text" id="new-cert-name" placeholder="Ex: Desenvolvimento Web Completo">
      </div>
      <div class="form-group">
        <label>Instituição</label>
        <input type="text" id="new-cert-issuer" placeholder="Ex: Udemy">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="text" id="new-cert-date" placeholder="Ex: Jan 2024">
      </div>
      <div class="form-group">
        <label>Arquivo (PDF ou Imagem)</label>
        <input type="file" id="cert-file-upload" accept=".pdf,image/*">
      </div>
      <button class="edit-btn" onclick="addCertificateWithFile()"><i class="fas fa-upload"></i> Adicionar Certificado</button>
    </div>
    
    <h3>Certificados Existentes</h3>
    <div id="certs-list-admin"></div>
  </div>
  
  <!-- Projetos -->
  <div class="admin-section">
    <div class="section-header">
      <h2><i class="fas fa-project-diagram"></i> Projetos</h2>
      <button class="edit-btn" onclick="saveProjects()"><i class="fas fa-save"></i> Salvar</button>
    </div>
    
    <div style="background: var(--bg2); padding: 20px; border-radius: 8px; margin-bottom: 30px;">
      <h3><i class="fas fa-plus-circle"></i> Adicionar Novo Projeto</h3>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="new-project-title">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="new-project-desc" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>Tecnologias (separadas por vírgula)</label>
        <input type="text" id="new-project-techs" placeholder="React, Node.js, PostgreSQL">
      </div>
      <div class="form-group">
        <label>URL do Projeto (opcional)</label>
        <input type="text" id="new-project-url">
      </div>
      <div class="form-group">
        <label>URL do GitHub (opcional)</label>
        <input type="text" id="new-project-github">
      </div>
      <div class="form-group">
        <label>Imagem do Projeto</label>
        <input type="file" id="new-project-image" accept="image/*">
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="new-project-featured"> Projeto em destaque
        </label>
      </div>
      <button class="edit-btn" onclick="addProject()"><i class="fas fa-plus"></i> Adicionar Projeto</button>
    </div>
    
    <h3>Projetos Existentes</h3>
    <div id="projects-list-admin"></div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
